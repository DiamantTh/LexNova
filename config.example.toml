[app]
base_url = ""
locale   = "de"

# Generated during installation — do NOT change after TOTP secrets are enrolled.
# Changing this key invalidates all existing TOTP registrations.
[security]
totp_app_key = ""

[db]
# Supported drivers: sqlite, mysql, pgsql
# SQLite  : dsn = "sqlite:/absolute/path/to/lexnova.sqlite"
# MySQL   : dsn = "mysql:host=localhost;dbname=lexnova;charset=utf8mb4"
# PostgreSQL: dsn = "pgsql:host=localhost;dbname=lexnova"
dsn      = "sqlite:/path/to/lexnova/data/lexnova.sqlite"
user     = ""
password = ""

[install]
lock          = "/path/to/lexnova/data/install.lock"
password_file = "/path/to/lexnova/data/install.pw"
config_file   = "/path/to/lexnova/configs/config.toml"

[session]
name     = "lexnova_session"
secure   = false
httponly = true
samesite = "Lax"

[log]
path  = "/path/to/lexnova/logs/lexnova.log"
level = "info"

[twig]
# Set to false to disable template caching (e.g. during development).
# A warning will be shown in the admin panel when cache is disabled.
cache = true

# ── Brute-force rate limiting ─────────────────────────────────────────────────
# Applies to /admin/login and /admin/totp/verify.
# max_attempts  : failed login/TOTP attempts before the IP is temporarily blocked
# block_seconds : block duration in seconds (default: 5 minutes)
[rate_limit]
max_attempts  = 5
block_seconds = 300
